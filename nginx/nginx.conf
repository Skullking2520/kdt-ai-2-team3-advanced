upstream fastapi_backend {
    server fastapi:8000; # 127.0.0.1 대신 도커 컴포즈 서비스명 사용
}

upstream prometheus_backend {
    server prometheus:9090;
}

upstream grafana_backend {
    server grafana:3000;
}

# http 블록 안에 추가
# zone 이름은 api_limit, 10MB 메모리 사용, key는 클라이언트 IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name smishing-detect-kdt2.cloud;

    ssl_certificate /etc/letsencrypt/live/smishing-detect-kdt2.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smishing-detect-kdt2.cloud/privkey.pem;

    # Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 일반 요청 제한 (예: 초당 30회)
        limit_req zone=general_limit burst=20 nodelay;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://fastapi_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 요청 제한 (예: 초당 10회, burst 5)
        limit_req zone=api_limit burst=5 nodelay;
    }

    # prometheus reverse proxy
    location /prometheus/ {
        proxy_pass http://prometheus_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prometheus 요청 제한
        limit_req zone=general_limit burst=10 nodelay;
    }

    # grafana reverse proxy
    location /grafana/ {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # Grafana 요청 제한
        limit_req zone=general_limit burst=15 nodelay;
    }
}
