worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream fastapi_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name smishing-detect-kdt2.cloud; # 본인 도메인

        HTTP to HTTPS Redirect
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name smishing-detect-kdt2.cloud;

        ssl_certificate /etc/letsencrypt/live/smishing-detect-kdt2.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smishing-detect-kdt2.cloud/privkey.pem;

        # Frontend Static Files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backend API Proxy
        location /api {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
