name: Smishing Project CICD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. AWS 자격증명 설정 (ECR용)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. 백엔드 Docker 빌드 & ECR 푸시
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: 395120012527.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/smishing-server:latest

      # 4. 프론트엔드 빌드
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build -- --mode staging
        env:
          VITE_USE_MOCK: false
          VITE_API_BASE_URL: https://smishing-detect-kdt2.cloud
          VITE_API_TIMEOUT: 10000
          VITE_DEBUG: false

      # 5. EC2에 프론트엔드 빌드 파일 전송
      - name: Copy Frontend to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/${{ vars.EC2_USER }}/frontend-dist"
          strip_components: 2

      # 6. EC2 배포 (새 이미지 pull + 재시작)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # S3 자격증명 .env 업데이트
            sed -i 's|^AWS_ACCESS_KEY_ID=.*|AWS_ACCESS_KEY_ID=${{ secrets.S3_AWS_ACCESS_KEY_ID }}|' ~/.env
            sed -i 's|^AWS_SECRET_ACCESS_KEY=.*|AWS_SECRET_ACCESS_KEY=${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}|' ~/.env
            aws ecr get-login-password --region ${{ vars.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              395120012527.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
            docker-compose -f ~/docker-compose.prod.yml pull fastapi
            docker-compose -f ~/docker-compose.prod.yml up -d --no-deps --force-recreate fastapi
            docker-compose -f ~/docker-compose.prod.yml up -d --no-deps --force-recreate nginx
            docker image prune -f
