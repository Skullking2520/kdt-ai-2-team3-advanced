name: Smishing Project CICD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. AWS 자격증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. 백엔드 Docker 빌드 & ECR 푸시
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: 395120012527.dkr.ecr.ap-northeast-2.amazonaws.com/smishing-server:latest

      # 4. 프론트엔드 빌드
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build -- --mode staging
        env:
          VITE_USE_MOCK: false
          VITE_API_BASE_URL: https://smishing-detect-kdt2.cloud
          VITE_API_TIMEOUT: 10000
          VITE_DEBUG: false

      # 5. EC2에 프론트엔드 빌드 파일 전송
      - name: Copy Frontend to EC2
        uses: appleboy/scp-action@master
        with:
          host: 3.37.93.11
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/ubuntu/frontend-dist"
          strip_components: 2

      # 6. EC2 배포 (새 이미지 pull + 재시작)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 3.37.93.11
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin \
              395120012527.dkr.ecr.ap-northeast-2.amazonaws.com
            docker pull 395120012527.dkr.ecr.ap-northeast-2.amazonaws.com/smishing-server:latest
            docker-compose -f ~/docker-compose.prod.yml up -d fastapi
            docker restart nginx
            docker image prune -f
