name: Weekly Encoder Retraining

on:
  workflow_dispatch:
    inputs:
      dataset_version:
        description: "Prepared dataset version under encoder_retraining/data/prepared/"
        required: true
        default: "encoder-weekly"
      prepared_dataset_url:
        description: "Optional tar.gz URL containing cleaned_train.jsonl, valid.jsonl, test.jsonl"
        required: false
        default: ""
      dry_run:
        description: "Skip actual training and model comparison"
        required: true
        type: boolean
        default: true
      upload_to_hf:
        description: "Upload to Hugging Face only when promotion is recommended"
        required: true
        type: boolean
        default: false
      use_smoke_dataset:
        description: "Use a tiny generated dataset for workflow validation only"
        required: true
        type: boolean
        default: false
      epochs:
        description: "Training epochs"
        required: true
        default: "3"
      n_trials:
        description: "Optuna trials"
        required: true
        default: "1"
  schedule:
    # Weekly Monday 03:00 KST = Sunday 18:00 UTC.
    - cron: "0 18 * * 0"

permissions:
  contents: read

env:
  BASELINE_MODEL: kdt-2-team4-newbiz/kcelectra-smishing-classifier
  DATASET_VERSION: ${{ github.event.inputs.dataset_version || 'encoder-weekly' }}
  PREPARED_DATASET_URL: ${{ github.event.inputs.prepared_dataset_url || secrets.ENCODER_PREPARED_DATASET_URL }}
  PREPARED_DATASET_BEARER_TOKEN: ${{ secrets.ENCODER_PREPARED_DATASET_BEARER_TOKEN }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_REPO_ID: kdt-2-team4-newbiz/kcelectra-smishing-classifier
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install encoder dependencies
        run: uv sync --frozen --group encoder

      - name: Prepare dataset directory
        run: |
          set -euo pipefail
          mkdir -p "encoder_retraining/data/prepared/${DATASET_VERSION}"

      - name: Generate smoke dataset
        if: ${{ github.event.inputs.use_smoke_dataset == 'true' }}
        run: |
          set -euo pipefail
          dataset_dir="encoder_retraining/data/prepared/${DATASET_VERSION}"
          cat > "${dataset_dir}/cleaned_train.jsonl" <<'JSONL'
          {"text":"정상 안내 문자입니다.","label":0}
          {"text":"배송 주소 오류로 반송 예정입니다. <URL>","label":1}
          JSONL
          cat > "${dataset_dir}/valid.jsonl" <<'JSONL'
          {"text":"회의 일정 안내입니다.","label":0}
          {"text":"계좌가 정지되었습니다. 보안 인증을 진행하세요. <URL>","label":1}
          JSONL
          cat > "${dataset_dir}/test.jsonl" <<'JSONL'
          {"text":"인증번호는 123456입니다. 타인에게 알려주지 마세요.","label":0}
          {"text":"환급금 수령을 위해 개인정보를 입력하세요. <URL>","label":1}
          JSONL
          cat > "${dataset_dir}/manifest.json" <<JSON
          {
            "dataset_version": "${DATASET_VERSION}",
            "source": "workflow_smoke_dataset",
            "notes": "Only for validating GitHub Actions wiring."
          }
          JSON

      - name: Download prepared dataset
        if: ${{ github.event.inputs.use_smoke_dataset != 'true' }}
        run: |
          set -euo pipefail
          if [ -z "${PREPARED_DATASET_URL}" ]; then
            echo "ENCODER_PREPARED_DATASET_URL secret or prepared_dataset_url input is required."
            exit 1
          fi

          dataset_dir="encoder_retraining/data/prepared/${DATASET_VERSION}"
          archive_path="/tmp/${DATASET_VERSION}.tar.gz"

          if [ -n "${PREPARED_DATASET_BEARER_TOKEN}" ]; then
            curl --fail --location \
              --header "Authorization: Bearer ${PREPARED_DATASET_BEARER_TOKEN}" \
              --output "${archive_path}" \
              "${PREPARED_DATASET_URL}"
          else
            curl --fail --location \
              --output "${archive_path}" \
              "${PREPARED_DATASET_URL}"
          fi

          tar -xzf "${archive_path}" -C "${dataset_dir}"

      - name: Validate prepared dataset
        run: |
          set -euo pipefail
          dataset_dir="encoder_retraining/data/prepared/${DATASET_VERSION}"
          test -s "${dataset_dir}/cleaned_train.jsonl"
          test -s "${dataset_dir}/valid.jsonl"
          test -s "${dataset_dir}/test.jsonl"

      - name: Run encoder retraining pipeline
        run: |
          set -euo pipefail
          run_id="weekly-${DATASET_VERSION}-$(date -u +%Y%m%dT%H%M%SZ)"
          args=(
            uv run --group encoder python
            encoder_retraining/pipeline/run_retraining_pipeline.py
            --prepared-dir "encoder_retraining/data/prepared/${DATASET_VERSION}"
            --baseline-model "${BASELINE_MODEL}"
            --output-dir "encoder_retraining/data/runs/${run_id}"
            --experiments focal_no_oversampling
            --n-trials "${{ github.event.inputs.n_trials || '1' }}"
            --epochs "${{ github.event.inputs.epochs || '3' }}"
          )
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"
          echo "RUN_ID=${run_id}" >> "${GITHUB_ENV}"

      - name: Upload retraining artifacts
        uses: actions/upload-artifact@v4
        with:
          name: encoder-retraining-${{ env.RUN_ID }}
          path: |
            encoder_retraining/data/runs/${{ env.RUN_ID }}/retraining_pipeline_manifest.json
            encoder_retraining/data/runs/${{ env.RUN_ID }}/evaluation/
            encoder_retraining/data/runs/${{ env.RUN_ID }}/training/*/test_metrics.json
            encoder_retraining/data/runs/${{ env.RUN_ID }}/logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Promote candidate to Hugging Face
        if: ${{ github.event.inputs.upload_to_hf == 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          uv run --group encoder python \
            encoder_retraining/pipeline/promote_encoder_model.py \
            --promotion-manifest \
            "encoder_retraining/data/runs/${RUN_ID}/evaluation/promotion_manifest.json" \
            --repo-id "${HF_REPO_ID}" \
            --model-version "${RUN_ID}" \
            --private \
            --upload
