services:
  mysql:
    image: mysql:8.0
    container_name: smishing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev1234
      MYSQL_DATABASE: smishing
      MYSQL_USER: smishing_user
      MYSQL_PASSWORD: dev1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdev1234"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
